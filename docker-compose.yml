version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: apiguard
      POSTGRES_PASSWORD: apiguard_secret
      POSTGRES_DB: apiguard
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U apiguard']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: node server.js
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      DATABASE_URL: postgresql://apiguard:apiguard_secret@db:5432/apiguard
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5000
      JWT_SECRET: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3

  worker:
    build: ./backend
    command: node worker.js
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://apiguard:apiguard_secret@db:5432/apiguard
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: .
    command: npx vite --host
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
